name: Telegram Notify

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, closed, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message on push
        if: github.event_name == 'push'
        run: |
          MESSAGE=$'\xF0\x9F\x9A\x80 *Push to* `${{ github.ref_name }}`\n\n\xF0\x9F\x91\xA4 *${{ github.actor }}*\n\xF0\x9F\x92\xAC ${{ github.event.head_commit.message }}\n\n\xF0\x9F\x94\x97 [View commit](${{ github.event.head_commit.url }})'
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true"

      - name: Send Telegram message on PR
        if: github.event_name == 'pull_request'
        run: |
          MESSAGE=$'\xF0\x9F\x93\x9D *PR ${{ github.event.action }}*: ${{ github.event.pull_request.title }}\n\n\xF0\x9F\x91\xA4 ${{ github.actor }}\n\xF0\x9F\x94\x97 [View PR](${{ github.event.pull_request.html_url }})'
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true"
